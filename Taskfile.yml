version: "3"

vars:
  BIN_DIR: '{{ .BIN_DIR | default "./.bin" }}'
  UV_VERSION: "0.10.11"
  UV_BIN: "{{ .BIN_DIR }}/uv-{{ .UV_VERSION }}"

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  build:
    desc: Build the importer module
    cmds:
      - go build ./...

  test:
    desc: Run unit tests
    cmds:
      - go test -race -coverprofile=coverage.out ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  license:
    desc: Run license check
    cmds:
      - licensei cache
      - licensei check

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  pre-commit:golangci-lint:
    desc: Run golangci-lint pre-commit hook
    cmds:
      - golangci-lint run --fix {{.CLI_ARGS | default "./..."}}

  deps:
    desc: Install development dependencies and git hooks
    cmds:
      - pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  deps:bin-dir:
    internal: true
    cmds:
      - mkdir -p {{ .BIN_DIR }}
    status:
      - test -d {{ .BIN_DIR }}

  deps:uv:
    desc: Install uv
    deps:
      - deps:bin-dir
    env:
      UV_INSTALL_DIR: "{{ .BIN_DIR }}"
    cmds:
      - curl -sfL https://astral.sh/uv/{{ .UV_VERSION }}/install.sh | sh
      - mv {{ .BIN_DIR }}/uv {{ .UV_BIN }}
      - chmod +x {{ .UV_BIN }}
      - rm -f {{ .BIN_DIR }}/uvx
    status:
      - test -x {{ .UV_BIN }}

  deps:mcp-scanner:
    desc: Install mcp-scanner CLI via uv
    deps:
      - deps:uv
    cmds:
      - echo "Installing mcp-scanner"
      - "{{ .UV_BIN }} tool install --python 3.13 cisco-ai-mcp-scanner"

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{ .BIN_DIR }} coverage.out
